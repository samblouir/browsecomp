run:
  name: "${BC250_RUN_NAME:-browsecomp250-star7-agent-20260715}"
  output_dir: runs
  seed: 20260715
  concurrency: ${BC250_RUN_CONCURRENCY:-7}
  routing_cohort_size: ${BC250_ROUTER_COHORT_SIZE:-11}
  routing_max_concurrency_per_cohort: ${BC250_ROUTER_MAX_CONCURRENCY_PER_COHORT:-4}
  attempts: 1
  shuffle: true
  resume: true
  fail_fast: false
  task_timeout_seconds: 3600
  write_private_transcripts: true

dataset:
  source_url: https://openaipublic.blob.core.windows.net/simple-evals/browse_comp_test_set.csv
  cache_dir: ~/.cache/browsecomp250
  expected_rows: 1266
  expected_sha256: "${BC250_EXPECTED_DATASET_SHA256:-}"
  subset_indices_path: data/subset_indices.json
  subset_size: 250

model:
  api_base: "${BC250_MODEL_API_BASE:-http://127.0.0.1:8003/v1}"
  api_key: "${BC250_MODEL_API_KEY:-frontierrl-public}"
  allow_empty_api_key: false
  model: "${BC250_MODEL_NAME:-frontierrl/star-7}"
  extra_headers_json: '${BC250_MODEL_EXTRA_HEADERS:-{}}'
  protocol: tools
  temperature: 0.3
  max_output_tokens: 16384
  timeout_seconds: 360
  max_retries: 10
  response_chain: ${BC250_MODEL_RESPONSE_CHAIN:-false}
  input_price_per_million: ${BC250_MODEL_INPUT_PRICE_PER_MILLION:-0}
  output_price_per_million: ${BC250_MODEL_OUTPUT_PRICE_PER_MILLION:-0}
  extra_body:
    top_p: 0.95
    parallel_tool_calls: false
    vllm_xargs:
      frontierrl_max_denoising_steps: 48

search:
  provider: "${BC250_SEARCH_PROVIDER:-brave}"
  results_per_call: 10
  country: US
  language: en
  safe_search: moderate
  timeout_seconds: 30
  max_retries: 4
  live_preflight: true
  live_preflight_query: OpenAI official website
  cache_mode: readwrite
  cache_path: ~/.cache/browsecomp250/search-cache.sqlite3
  brave_api_key: "${BC250_BRAVE_API_KEY:-}"
  brave_ssh_host: "${BC250_BRAVE_SSH_HOST:-sam-mba15}"
  brave_ssh_bin: "${BC250_BRAVE_SSH_BIN:-ssh}"
  brave_ssh_remote_curl_bin: "${BC250_BRAVE_SSH_REMOTE_CURL_BIN:-curl}"
  brave_ssh_connect_timeout_seconds: ${BC250_BRAVE_SSH_CONNECT_TIMEOUT_SECONDS:-8}
  brave_ssh_max_concurrency: ${BC250_BRAVE_SSH_MAX_CONCURRENCY:-16}
  brave_ssh_min_interval_seconds: ${BC250_BRAVE_SSH_MIN_INTERVAL_SECONDS:-0.1}
  brave_ssh_error_cooldown_seconds: ${BC250_BRAVE_SSH_ERROR_COOLDOWN_SECONDS:-3.0}
  openrouter_api_key: "${BC250_OPENROUTER_API_KEY:-}"
  openrouter_api_base: "${BC250_OPENROUTER_API_BASE:-https://openrouter.ai/api/v1}"
  openrouter_search_model: "${BC250_OPENROUTER_SEARCH_MODEL:-openai/gpt-4.1-nano}"
  openrouter_search_max_concurrency: ${BC250_OPENROUTER_SEARCH_MAX_CONCURRENCY:-32}
  openrouter_search_max_results: 10
  openrouter_search_max_snippet_chars: 2400
  openrouter_search_temperature: 0.3
  openrouter_search_top_p: 0.95
  openrouter_search_max_output_tokens: 16384
  tavily_api_key: "${BC250_TAVILY_API_KEY:-}"
  serper_api_key: "${BC250_SERPER_API_KEY:-}"
  searxng_base_url: "${BC250_SEARXNG_BASE_URL:-http://127.0.0.1:8080}"
  google_chrome_host: "${BC250_GOOGLE_CHROME_HOST:-sam-mbp-rev}"
  google_chrome_ssh_bin: "${BC250_GOOGLE_CHROME_SSH_BIN:-ssh}"
  google_chrome_scp_bin: "${BC250_GOOGLE_CHROME_SCP_BIN:-scp}"
  google_chrome_python_bin: "${BC250_GOOGLE_CHROME_PYTHON_BIN:-python3}"
  google_chrome_cua_driver: "${BC250_GOOGLE_CHROME_CUA_DRIVER:-~/.star-hermes/bin/cua-driver}"
  google_chrome_bundle_id: com.google.Chrome
  google_chrome_max_fanout: 8
  google_chrome_timeout_seconds: 45
  google_chrome_connect_timeout_seconds: 5
  google_chrome_max_retries: 0
  bing_ssh_host: "${BC250_BING_SSH_HOST:-sam-mba15}"
  bing_ssh_bin: "${BC250_BING_SSH_BIN:-ssh}"
  bing_ssh_remote_curl_bin: "${BC250_BING_SSH_REMOTE_CURL_BIN:-curl}"
  bing_ssh_connect_timeout_seconds: ${BC250_BING_SSH_CONNECT_TIMEOUT_SECONDS:-8}
  bing_ssh_max_concurrency: ${BC250_BING_SSH_MAX_CONCURRENCY:-16}
  bing_ssh_min_interval_seconds: ${BC250_BING_SSH_MIN_INTERVAL_SECONDS:-0.1}
  bing_ssh_error_cooldown_seconds: ${BC250_BING_SSH_ERROR_COOLDOWN_SECONDS:-3.0}
  yahoo_max_concurrency: ${BC250_YAHOO_MAX_CONCURRENCY:-3}
  yahoo_min_interval_seconds: ${BC250_YAHOO_MIN_INTERVAL_SECONDS:-0.35}
  yahoo_error_cooldown_seconds: ${BC250_YAHOO_ERROR_COOLDOWN_SECONDS:-3.0}
  yahoo_ssh_host: "${BC250_YAHOO_SSH_HOST:-sam-mbp-rev}"
  yahoo_ssh_bin: "${BC250_YAHOO_SSH_BIN:-ssh}"
  yahoo_ssh_remote_curl_bin: "${BC250_YAHOO_SSH_REMOTE_CURL_BIN:-curl}"
  yahoo_ssh_connect_timeout_seconds: ${BC250_YAHOO_SSH_CONNECT_TIMEOUT_SECONDS:-8}
  hybrid_mode: merge

browser:
  backend: direct
  timeout_seconds: 30
  max_redirects: 5
  max_response_bytes: 8000000
  max_text_chars_per_open: 30000
  max_links_per_page: 80
  user_agent: BrowseComp250-Star/0.1
  block_private_networks: true
  allow_nonstandard_ports: false
  cache_mode: readwrite
  cache_path: ~/.cache/browsecomp250/page-cache.sqlite3
  reader_fallback_enabled: true
  reader_fallback_base_url: https://r.jina.ai
  reader_fallback_min_chars: 300

agent:
  max_steps: 80
  max_search_calls: 80
  max_page_opens: 100
  max_find_calls: 80
  max_retrieved_chars: 2000000
  max_history_chars: 300000
  parse_retries: 3
  require_citations: true
  require_opened_citation_support: true
  allow_unsupported_final_at_hard_budget: true
  enable_search_many: true
  enable_open_many: true
  max_batch_size: 7
  automatic_external_after_search_calls: 8
  automatic_external_requests: 1
  automatic_page_inspection_after_search_actions: 2
  automatic_page_inspection_count: 4
  automatic_page_inspection_max_chars: 10000
  max_consecutive_duplicate_actions: 3
  automatic_external_strategy_recovery: true
  automatic_finalization_rescue_after_rejections: 2
  automatic_finalization_rescue_after_seconds: 900
  system_prompt_path: prompts/star_browsecomp_system.md

external_model:
  enabled: ${BC250_EXTERNAL_MODEL_ENABLED:-true}
  mode: agent
  api_url: "${BC250_EXTERNAL_MODEL_API_URL:-http://127.0.0.1:8000/api/external-model-requests}"
  admin_token: "${BC250_EXTERNAL_MODEL_ADMIN_TOKEN:-}"
  default_provider: "${BC250_EXTERNAL_MODEL_PROVIDER:-chatgpt}"
  allowed_providers: [chatgpt, openai, anthropic, gemini, openrouter]
  default_model: "${BC250_EXTERNAL_MODEL_NAME:-}"
  temperature: 0.7
  top_p: 0.95
  max_output_tokens: 16384
  max_calls_per_task: 8
  max_batch_size: 4
  max_concurrency: ${BC250_EXTERNAL_MAX_CONCURRENCY:-32}
  timeout_seconds: 900
  max_retries: 2
  agent_api_base: "${BC250_EXTERNAL_AGENT_API_BASE:-http://127.0.0.1:8003/v1}"
  agent_api_key: "${BC250_MODEL_API_KEY:-frontierrl-public}"
  agent_allow_empty_api_key: false
  agent_model: frontierrl/star-2
  agent_response_chain: ${BC250_EXTERNAL_AGENT_RESPONSE_CHAIN:-false}
  agent_max_steps: ${BC250_EXTERNAL_AGENT_MAX_STEPS:-12}
  agent_min_search_calls_before_final: 1
  agent_max_search_calls: ${BC250_EXTERNAL_AGENT_MAX_SEARCH_CALLS:-24}
  agent_max_page_opens: ${BC250_EXTERNAL_AGENT_MAX_PAGE_OPENS:-32}
  agent_max_find_calls: ${BC250_EXTERNAL_AGENT_MAX_FIND_CALLS:-16}
  agent_max_retrieved_chars: ${BC250_EXTERNAL_AGENT_MAX_RETRIEVED_CHARS:-500000}
  agent_max_history_chars: ${BC250_EXTERNAL_AGENT_MAX_HISTORY_CHARS:-200000}
  agent_force_final_after_seconds: ${BC250_EXTERNAL_AGENT_FORCE_FINAL_AFTER_SECONDS:-300}
  agent_max_denoising_steps: 48
  agent_routing_backend_pool:
    - local_port_9364
    - vastai_pro6000_109_star2_gpu0
    - vastai_pro6000_109_star2_gpu1
    - vastai_pro6000_109_star2_gpu2
    - vastai_pro6000_109_star2_gpu3
    - vastai_pro6000_109_star2_gpu4
    - vastai_pro6000_109_star2_gpu5
    - vastai_pro6000_109_star2_gpu6

grader:
  mode: official_llm
  api_base: "${BC250_GRADER_API_BASE:-https://api.openai.com/v1}"
  api_key: "${BC250_GRADER_API_KEY:-}"
  allow_empty_api_key: false
  model: "${BC250_GRADER_MODEL:-gpt-5.6}"
  extra_headers_json: '${BC250_GRADER_EXTRA_HEADERS:-{}}'
  temperature: null
  max_output_tokens: 16384
  timeout_seconds: 300
  max_retries: 4
  input_price_per_million: ${BC250_GRADER_INPUT_PRICE_PER_MILLION:-0}
  output_price_per_million: ${BC250_GRADER_OUTPUT_PRICE_PER_MILLION:-0}
  extra_body:
    max_completion_tokens: 16384

report:
  confidence_level: 0.95
  bootstrap_samples: 10000
  write_html: true
  write_csv: true
  public_report_omits_questions: true
  public_report_omits_answers: true
